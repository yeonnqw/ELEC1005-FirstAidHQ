            - Container2:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutGridColumnEnd: =11
                  LayoutGridColumnStart: =2
                  LayoutGridRowEnd: =2
                  LayoutGridRowStart: =1
                  X: =40
                  Y: =40
                Children:
                  - Text9:
                      Control: ModernText@1.0.0
                      Properties:
                        Height: =55
                        Size: =25
                        Text: |-
                          ="Assigned Tasks: " & CountRows(Gallery1_2.AllItems)
                        Width: =262
                        X: =525
                        Y: =12
            - Container3:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutGridColumnEnd: =11
                  LayoutGridColumnStart: =2
                  LayoutGridRowEnd: =5
                  LayoutGridRowStart: =4
                  X: =40
                  Y: =40
                Children:
                  - Text8:
                      Control: ModernText@1.0.0
                      Properties:
                        Height: =48
                        Size: =25
                        Text: |-
                          ="Active Emergency Reports: " & CountRows(Gallery1.AllItems)
                        Width: =385
                        X: =462
                        Y: =15
      - Icon7:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: |-
              =If(
                  currentPage = "Volunteer",
                  Color.Gray,
                  RGBA(0, 120, 212, 1)
              )
            DisabledBorderColor: =RGBA(245, 245, 245, 1)
            DisabledColor: =RGBA(225, 223, 221, 1)
            DisabledFill: =RGBA(0, 0, 0, 0)
            FocusedBorderThickness: =4
            HoverBorderColor: =RGBA(0, 0, 0, 0)
            HoverColor: =RGBA(16, 110, 190, 1)
            HoverFill: =RGBA(0, 0, 0, 0)
            Icon: =Icon.Person
            OnSelect: |-
              =If(
                  currentRole = "Volunteer",

                  Set(currentPage, "Volunteer");
                  Navigate('volunteer''s page'),

                  Set(currentPage, "Coordinator");
                  Navigate('coordinator''s page')
              )
            PressedBorderColor: =RGBA(0, 0, 0, 0)
            PressedColor: =RGBA(16, 110, 190, 1)
            PressedFill: =RGBA(0, 0, 0, 0)
            X: =42
            Y: =328
      - Icon6:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: |-
              =If(
                  currentPage = "User",
                  Color.Gray,
                  RGBA(0, 120, 212, 1)
              )
            DisabledBorderColor: =RGBA(245, 245, 245, 1)
            DisabledColor: =RGBA(225, 223, 221, 1)
            DisabledFill: =RGBA(0, 0, 0, 0)
            FocusedBorderThickness: =4
            HoverBorderColor: =RGBA(0, 0, 0, 0)
            HoverColor: =RGBA(16, 110, 190, 1)
            HoverFill: =RGBA(0, 0, 0, 0)
            Icon: =Icon.Publish
            OnSelect: |-
              =Set(currentPage,"User");
              Navigate('user''s page')
            PressedBorderColor: =RGBA(0, 0, 0, 0)
            PressedColor: =RGBA(16, 110, 190, 1)
            PressedFill: =RGBA(0, 0, 0, 0)
            X: =42
            Y: =131
      - Icon14:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: |-
              =If(
                  IsBlank(currentUser),
                  Color.Gray,
                  RGBA(0, 120, 212, 1)
              )
            DisabledBorderColor: =RGBA(245, 245, 245, 1)
            DisabledColor: =RGBA(225, 223, 221, 1)
            DisabledFill: =RGBA(0, 0, 0, 0)
            FocusedBorderThickness: =4
            HoverBorderColor: =RGBA(0, 0, 0, 0)
            HoverColor: =RGBA(16, 110, 190, 1)
            HoverFill: =RGBA(0, 0, 0, 0)
            Icon: =Icon.Leave
            OnSelect: |-
              =If(
                  !IsBlank(currentUser),

                  Set(currentUser, Blank());
                  Set(currentRole, Blank());
                  Set(currentPage, "User");
                  Navigate('user''s page')
              )
            PressedBorderColor: =RGBA(0, 0, 0, 0)
            PressedColor: =RGBA(16, 110, 190, 1)
            PressedFill: =RGBA(0, 0, 0, 0)
            X: =42
            Y: =525
