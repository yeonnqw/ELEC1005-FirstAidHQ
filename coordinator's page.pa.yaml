Screens:
  coordinator's page:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      LoadingSpinnerColor: =RGBA(0, 120, 212, 1)
    Children:
      - Grid2:
          Control: GroupContainer@1.5.0
          Variant: GridLayout
          Properties:
            Fill: =RGBA(255, 251, 254, 1)
            Height: =Parent.Height
            LayoutGap: =16
            LayoutGridColumns: =10
            LayoutGridRows: =8
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - HeaderContainer1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGridColumnEnd: =11
                  LayoutGridColumnStart: =2
                  LayoutGridRowEnd: =2
                  LayoutGridRowStart: =1
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - Text2:
                      Control: ModernText@1.0.0
                      Properties:
                        Height: =60
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =30
                        Text: |-
                          ="Unassigned: " &
                          CountRows(Filter(CommunityFirstAid, Status.Value = "Unassigned"))
                        Width: =250
                  - Text3:
                      Control: ModernText@1.0.0
                      Properties:
                        Height: =60
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =30
                        Text: |-
                          ="In Progress: " &
                          CountRows(
                              Filter(CommunityFirstAid, Status.Value = "In Progress")
                          )
                        Width: =250
                  - Text5:
                      Control: ModernText@1.0.0
                      Properties:
                        Height: =60
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        Size: =30
                        Text: |-
                          ="Resolved: "&
                          CountRows(
                              Filter(CommunityFirstAid, Status.Value = "Resolved")
                          )
                        Width: =250
            - SidebarContainer2:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGridColumnEnd: =2
                  LayoutGridColumnStart: =1
                  LayoutGridRowEnd: =9
                  LayoutGridRowStart: =1
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
            - MainContainer1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGridColumnEnd: =7
                  LayoutGridColumnStart: =2
                  LayoutGridRowEnd: =9
                  LayoutGridRowStart: =2
                  PaddingBottom: =8
                  PaddingLeft: =8
                  PaddingRight: =8
                  PaddingTop: =8
                  X: =40
                  Y: =40
                Children:
                  - Gallery1_1:
                      Control: Gallery@2.15.0
                      Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
                      Properties:
                        BorderColor: =RGBA(245, 245, 245, 1)
                        Items: |-
                          =Filter(
                              CommunityFirstAid,
                              Status.Value = "Unassigned" 
                          )
                        LayoutMinHeight: =16
                        LayoutMinWidth: =16
                        TemplateSize: =160
                      Children:
                        - Image1_1:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              BorderThickness: =2
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(0, 0, 0, 0)
                              FocusedBorderThickness: =4
                              Height: =72
                              HoverBorderColor: =RGBA(0, 0, 0, 0)
                              HoverFill: =RGBA(0, 0, 0, 0)
                              OnSelect: =Select(Parent)
                              PressedBorderColor: =RGBA(0, 0, 0, 0)
                              PressedFill: =RGBA(0, 0, 0, 0)
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                              Width: =72
                              X: =15
                              Y: =40
                        - Title1_1:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(50, 49, 48, 1)
                              DisabledColor: =RGBA(161, 159, 157, 1)
                              Font: =Font.'Segoe UI'
                              FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                              Height: =111
                              OnSelect: =Select(Parent)
                              PaddingBottom: =0
                              PaddingLeft: =12
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =14
                              Text: |-
                                ="🚨 " & ThisItem.EmergencyType.Value &
                                Char(10) &
                                "📍 " & ThisItem.'Location: PlaceName' & ", " & ThisItem.'Location: Street' & ", " & ThisItem.'Location: City' & " " & ThisItem.'Location: Postcode' &
                                Char(10) &
                                "📍 Lat: " & ThisItem.Latitude &
                                ", Lng: " & ThisItem.Longitude&
                                Char(10) &
                                "📝 " & ThisItem.'Description (Optional)' &
                                Char(10) &
                                "👤 " & ThisItem.ReporterName &
                                Char(10) &
                                "🕒 " & Text(ThisItem.CreatedTime, "dd/mm/yyyy")
                              VerticalAlign: =VerticalAlign.Top
                              Width: =491
                              X: =90
                              Y: =24
                        - NextArrow1_1:
                            Control: Classic/Icon@2.5.0
                            Properties:
                              AccessibleLabel: =Self.Tooltip
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(166, 166, 166, 1)
                              DisabledBorderColor: =RGBA(56, 56, 56, 1)
                              DisabledColor: =RGBA(119, 119, 119, 1)
                              Height: =50
                              Icon: =Icon.ChevronRight
                              OnSelect: =Set(selectedReport, ThisItem)
                              PaddingBottom: =16
                              PaddingLeft: =16
                              PaddingRight: =16
                              PaddingTop: =16
                              Tooltip: ="查看项详细信息"
                              Width: =50
                              X: =581
                              Y: =54
                        - Separator1_1:
                            Control: Rectangle@2.3.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Fill: =RGBA(255, 255, 255, 1)
                              Height: =8
                              OnSelect: =Select(Parent)
                              Width: =Parent.TemplateWidth
                              Y: =Parent.TemplateHeight - Self.Height
                        - Rectangle1_1:
                            Control: Rectangle@2.3.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Fill: =RGBA(0, 120, 212, 1)
                              Height: =Parent.TemplateHeight - Separator1_1.Height
                              OnSelect: =Select(Parent)
                              Visible: =ThisItem.IsSelected
                              Width: =4
            - Container4:
                Control: GroupContainer@1.5.0
                Variant: GridLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutGridColumnEnd: =11
                  LayoutGridColumnStart: =7
                  LayoutGridRowEnd: =9
                  LayoutGridRowStart: =3
                  X: =40
                  Y: =40
                Children:
                  - Gallery4:
                      Control: Gallery@2.15.0
                      Variant: BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0
                      Properties:
                        BorderColor: =RGBA(245, 245, 245, 1)
                        Items: |
                          =Filter(
                              'Volunteer&Coordinator login',
                              MyRole.Value = "Volunteer" && Availability.Value = "Available"
                          )
                        LayoutGridColumnEnd: =5
                        LayoutGridColumnStart: =1
                        LayoutGridRowEnd: =3
                        LayoutGridRowStart: =1
                        Width: =524
                        X: =40
                        Y: =40
                      Children:
                        - Image4:
                            Control: Image@2.2.3
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              BorderStyle: =BorderStyle.None
                              BorderThickness: =2
                              DisabledBorderColor: =RGBA(0, 0, 0, 0)
                              DisabledFill: =RGBA(0, 0, 0, 0)
                              FocusedBorderThickness: =4
                              Height: =72
                              HoverBorderColor: =RGBA(0, 0, 0, 0)
                              HoverFill: =RGBA(0, 0, 0, 0)
                              OnSelect: =Select(Parent)
                              PressedBorderColor: =RGBA(0, 0, 0, 0)
                              PressedFill: =RGBA(0, 0, 0, 0)
                              RadiusBottomLeft: =8
                              RadiusBottomRight: =8
                              RadiusTopLeft: =8
                              RadiusTopRight: =8
                              Width: =1
                              Y: =(Parent.TemplateHeight / 2) - (Self.Height / 2)
                        - Title4:
                            Control: Label@2.5.1
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 1)
                              Color: =RGBA(50, 49, 48, 1)
                              DisabledColor: =RGBA(161, 159, 157, 1)
                              Font: =Font.'Segoe UI'
                              FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                              Height: =104
                              OnSelect: =Select(Parent)
                              PaddingBottom: =0
                              PaddingLeft: =12
                              PaddingRight: =0
                              PaddingTop: =0
                              Size: =14
                              Text: |-
                                ="👤 "& ThisItem.Name & Char(10) &
                                "🏠 Residence: " & ThisItem.'Location: Street' & ", " & ThisItem.'Location: City' & " " & ThisItem.'Location: Postcode' & Char(10) &
                                "🩺 " & ThisItem.Specialty.Value &
                                Char(10) &
                                If(
                                    !IsBlank(selectedReport.Latitude) &&
                                    !IsBlank(selectedReport.Longitude) &&
                                    !IsBlank(ThisItem.Latitude) &&
                                    !IsBlank(ThisItem.Longitude),

                                    "📏 Current distance to Report: " &
                                    Text(
                                        6371 * 2 * Asin(
                                            Sqrt(
                                                Power(
                                                    Sin(
                                                        Radians(ThisItem.Latitude - selectedReport.Latitude) / 2
                                                    ),
                                                    2
                                                ) +
                                                Cos(Radians(selectedReport.Latitude)) *
                                                Cos(Radians(ThisItem.Latitude)) *
                                                Power(
                                                    Sin(
                                                        Radians(ThisItem.Longitude - selectedReport.Longitude) / 2
                                                    ),
                                                    2
                                                )
                                            )
                                        ),
                                        "0.00"
                                    ) & " km",

                                    "📏 Current distance to Report: unavailable"
                                )
                              VerticalAlign: =VerticalAlign.Top
                              Width: =370
                              X: =1
                        - Separator4:
                            Control: Rectangle@2.3.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Fill: =RGBA(255, 255, 255, 1)
                              Height: =8
                              OnSelect: =Select(Parent)
                              Width: =Parent.TemplateWidth
                              Y: =Parent.TemplateHeight - Self.Height
                        - Rectangle4:
                            Control: Rectangle@2.3.0
                            Properties:
                              BorderColor: =RGBA(0, 0, 0, 0)
                              Fill: =RGBA(0, 120, 212, 1)
                              Height: =Parent.TemplateHeight - Separator4.Height
                              OnSelect: =Select(Parent)
                              Visible: =ThisItem.IsSelected
                              Width: =1
                        - Button4:
                            Control: ModernButton@1.0.0
                            Properties:
                              Height: =41
                              OnSelect: |-
                                =Patch(
                                    CommunityFirstAid,
                                    selectedReport,
                                    {
                                        Status: {Value: "In Progress"},
                                        AssignedVolunteer: ThisItem.Name,
                                        AssignmentStatus: {Value: "Pending"}
                                    }
                                );

                                Patch(
                                    'Volunteer&Coordinator login',
                                    ThisItem,
                                    {
                                        Availability: {Value: "Unavailable"}
                                    }
                                );

                                Notify("Assignment sent to volunteer!", NotificationType.Success);
                                Set(selectedReport, Blank());
                                Refresh('Volunteer&Coordinator login')
                              RadiusBottomLeft: =50
                              RadiusBottomRight: =50
                              RadiusTopLeft: =50
                              RadiusTopRight: =50
                              Size: =23
                              Text: ="Assign"
                              Visible: =!IsBlank(selectedReport)
                              Width: =118
                              X: =371
                              Y: =31
            - Container6:
                Control: GroupContainer@1.5.0
                Variant: ManualLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  LayoutGridColumnEnd: =11
                  LayoutGridColumnStart: =7
                  LayoutGridRowEnd: =3
                  LayoutGridRowStart: =2
                  X: =40
                  Y: =40
                Children:
                  - Text11:
                      Control: ModernText@1.0.0
                      Properties:
                        Height: =62
                        Size: =30
                        Text: |-
                          ="Available Volunteers: " & CountRows(Gallery4.AllItems)
                        Width: =396
                        X: =108
                        Y: =6
      - Icon8:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: |-
              =If(
                  currentPage = "User",
                  Color.Gray,
                  RGBA(0, 120, 212, 1)
              )
            DisabledBorderColor: =RGBA(245, 245, 245, 1)
            DisabledColor: =RGBA(225, 223, 221, 1)
            DisabledFill: =RGBA(0, 0, 0, 0)
            FocusedBorderThickness: =4
            HoverBorderColor: =RGBA(0, 0, 0, 0)
            HoverColor: =RGBA(16, 110, 190, 1)
            HoverFill: =RGBA(0, 0, 0, 0)
            Icon: =Icon.Publish
            OnSelect: |-
              =Set(currentPage, "User");
              Navigate('user''s page')
            PressedBorderColor: =RGBA(0, 0, 0, 0)
            PressedColor: =RGBA(16, 110, 190, 1)
            PressedFill: =RGBA(0, 0, 0, 0)
            X: =42
            Y: =131
      - Icon9:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: |-
              =If(
                  currentPage = "Coordinator",
                  Color.Gray,
                  RGBA(0, 120, 212, 1)
              )
            DisabledBorderColor: =RGBA(245, 245, 245, 1)
            DisabledColor: =RGBA(225, 223, 221, 1)
            DisabledFill: =RGBA(0, 0, 0, 0)
            FocusedBorderThickness: =4
            HoverBorderColor: =RGBA(0, 0, 0, 0)
            HoverColor: =RGBA(16, 110, 190, 1)
            HoverFill: =RGBA(0, 0, 0, 0)
            Icon: =Icon.Person
            OnSelect: |-
              =Set(currentPage, "Coordinator");
              Navigate('coordinator''s page')
            PressedBorderColor: =RGBA(0, 0, 0, 0)
            PressedColor: =RGBA(16, 110, 190, 1)
            PressedFill: =RGBA(0, 0, 0, 0)
            X: =42
            Y: =328
      - Icon15:
          Control: Classic/Icon@2.5.0
          Properties:
            BorderColor: =RGBA(0, 0, 0, 0)
            Color: |-
              =If(
                  IsBlank(currentUser),
                  Color.Gray,
                  RGBA(0, 120, 212, 1)
              )
            DisabledBorderColor: =RGBA(245, 245, 245, 1)
            DisabledColor: =RGBA(225, 223, 221, 1)
            DisabledFill: =RGBA(0, 0, 0, 0)
            FocusedBorderThickness: =4
            HoverBorderColor: =RGBA(0, 0, 0, 0)
            HoverColor: =RGBA(16, 110, 190, 1)
            HoverFill: =RGBA(0, 0, 0, 0)
            Icon: =Icon.Leave
            OnSelect: |-
              =If(
                  !IsBlank(currentUser),

                  Set(currentUser, Blank());
                  Set(currentRole, Blank());
                  Set(currentPage, "User");
                  Navigate('user''s page')
              )
            PressedBorderColor: =RGBA(0, 0, 0, 0)
            PressedColor: =RGBA(16, 110, 190, 1)
            PressedFill: =RGBA(0, 0, 0, 0)
            X: =42
            Y: =525
